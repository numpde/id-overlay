name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test

      - name: Build Chromium extension
        run: npm run build:chrome

      - name: Read extension version
        id: version
        run: |
          VERSION="$(node -p "JSON.parse(require('fs').readFileSync('manifest.chrome.json', 'utf8')).version")"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package Chromium extension
        run: |
          mkdir -p release
          (cd dist && zip -qr "../release/id-overlay-chrome-${{ steps.version.outputs.value }}.zip" .)

      - name: Upload packaged extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: id-overlay-chrome-${{ steps.version.outputs.value }}
          path: release/id-overlay-chrome-${{ steps.version.outputs.value }}.zip

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          gh release create "$TAG_NAME" \
            "release/id-overlay-chrome-${{ steps.version.outputs.value }}.zip" \
            --title "$TAG_NAME" \
            --generate-notes
